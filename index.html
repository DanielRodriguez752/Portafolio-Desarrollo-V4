<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/0e0737aa0f.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <title>Portafolio Daniel</title>
</head>
<body>
    <header>
        <h2 class="logo">DAN</h2>
        <input type="checkbox" id="check">
        <label for="check" class="mostrar-menu">
            &#8801
        </label>
        <nav class="menu">
            <a href="#">inicio</a>
            <a href="#">Sobre mi</a>
            <a href="#">Blog</a>
            <label for="check" class="ocultar-menu">
                &#215
            </label>
        </nav>
    </header>
    <section id="banner">
        <div class="contenido-banner">
            <h3><span>BIENVENIDO</span> A MI PORTAFOLIO <BR>DESARROLLADOR WEB</h3>
            <a  id="btn-tema" href="#" class="boton-empezar">CAMBIAR TEMA</a>
        </div>
    </section>
    <section id="buscador">
            <h3>BUSCAR PROYECTOS</h3>
                <input type="text" id="buscar-proyectos" placeholder="🔎 Buscar proyecto...">
    </section>
    <section id="proyectos">
        <div  id="contenedor-proyectos">
            <div class="proyecto-card">
                <h4></h4>
                <p></p>
                
                <a href="#" class="boton-saber-mas">Saber Más</a>
            </div> 
        </div>
    </section>
    <section id="iconos">
        <div class="contenido-iconos">
            <div>
                <i class="fas fa-solid fa-comment fa-3x"></i>
                <h6>Chat</h6>
                <p>Comunicate conmigo </p>
            </div>
            <div>
                <i class="fas fa-solid fa-envelope fa-3x "></i>
                <h6>Correo</h6>
                <p>Envíame un correo </p>
            </div>
            <div id="icono-alerta">
                <i class="fas fa-solid fa-bullhorn fa-3x"></i>
                <h6>Anuncios</h6>
                <p>Consulta los últimos anuncios </p>
            </div>
        </div>
        <div class="boton-iconos">
            <a href="#" class="boton-saber-mas">Saber Más</a>
        </div>
    </section>
    <footer>
        <p>&copy; 2026 Daniel Rodrigo Rodriguez Limachi. Todos lo derechos reservados</p>
    </footer>
</body>
<script src="script.js"></script>
</html>
